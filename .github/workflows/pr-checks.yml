name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend — Ruff + Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        run: pip install ruff mypy

      - name: Ruff (lint + format check)
        run: ruff check backend/app --output-format=github

      - name: Mypy (type check)
        run: mypy backend/app --ignore-missing-imports --strict

  backend-test:
    name: Backend — Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: esports_test
          POSTGRES_USER: esports_test
          POSTGRES_PASSWORD: esports_test
        ports:
          - 5432:5432
        options: '--health-cmd "pg_isready -U esports_test" --health-interval 10s --health-timeout 5s --health-retries 5'
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: '--health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r backend/requirements.txt

      - name: Pytest
        working-directory: backend
        env:
          # Settings uses individual DB_* fields, not DATABASE_URL
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: esports_test
          DB_USER: esports_test
          DB_PASSWORD: esports_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          SECRET_KEY: ci-test-secret-key-32chars-minimum
          # "test" is not in Literal["demo","mvp","prod"] — use demo
          ENVIRONMENT: demo
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --timeout=60

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend

  frontend-lint:
    name: Frontend — ESLint + TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run lint
        working-directory: frontend

      - run: npm run type-check
        working-directory: frontend

  frontend-test:
    name: Frontend — Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Jest
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false --ci
