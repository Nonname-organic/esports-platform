name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual rebuild
        required: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write  # OIDC for ECR login

jobs:
  tag:
    name: Compute image tag
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}
    steps:
      - id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  build:
    name: Build — ${{ matrix.service }}
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./backend
            target: production
          - service: worker
            context: ./backend
            target: worker
          - service: frontend
            context: ./frontend
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-build
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/esports-platform-${{ matrix.service }}:${{ needs.tag.outputs.image-tag }}
            ghcr.io/${{ github.repository_owner }}/esports-platform-${{ matrix.service }}:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com/esports-platform-${{ matrix.service }}:${{ needs.tag.outputs.image-tag }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com/esports-platform-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # provenance=false avoids multi-arch index manifests that confuse ECS
          provenance: false
