version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M  # t2.micro メモリ節約

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: esports_db
      POSTGRES_USER: esports_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-esports_pass}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esports_user -d esports_db"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 120mb --maxmemory-policy allkeys-lru --save ""
    # save "" = RDB永続化なし（揮発性・メモリ節約）
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 140M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Discord Bot（profile指定時のみ起動: docker compose --profile discord up -d）
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    profiles: ["discord"]
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - API_BASE_URL=http://api:8000
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL:-https://d3r8lgt0kvo61v.cloudfront.net}
      - USE_REDIS_QUEUE=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

volumes:
  postgres_prod_data:

# ===== ローカル開発用 =====
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
