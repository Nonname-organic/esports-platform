version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M  # t2.micro メモリ節約

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M  # t2.micro メモリ節約

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 120mb --maxmemory-policy allkeys-lru --save ""
    # save "" = RDB永続化なし（揮発性・メモリ節約）
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 140M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Discord Bot（profile指定時のみ起動: docker compose --profile discord up -d）
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    profiles: ["discord"]
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - API_BASE_URL=http://api:8000
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - USE_REDIS_QUEUE=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M

# ===== ローカル開発用 =====
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
