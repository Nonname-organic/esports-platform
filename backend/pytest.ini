[pytest]
asyncio_mode = strict
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    security: OWASP/セキュリティ系テスト
    contract: OpenAPI契約テスト
    slow: 低速テスト
filterwarnings =
    ignore::DeprecationWarning

# カバレッジは CI / 明示実行で:
#   pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=90
