{{- if .Values.api.pdb.enabled }}
# PodDisruptionBudget: guarantee at least N API pods are available during
# voluntary disruptions (node drain, cluster upgrades, AZ evacuation).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "esports-platform.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "esports-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "esports-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
---
{{- if .Values.frontend.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "esports-platform.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "esports-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  minAvailable: {{ .Values.frontend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "esports-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
{{- end }}
