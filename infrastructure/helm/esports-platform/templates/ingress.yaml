{{- if .Values.ingress.enabled }}
# AWS ALB Ingress — requires AWS Load Balancer Controller installed in the cluster.
# Install: helm repo add eks https://aws.github.io/eks-charts
#          helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#            -n kube-system --set clusterName=<cluster>
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "esports-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "esports-platform.labels" . | nindent 4 }}
  annotations:
    {{- range $k, $v := .Values.ingress.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API and WebSocket traffic
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "esports-platform.fullname" . }}-api
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "esports-platform.fullname" . }}-api
                port:
                  name: http
          # All other traffic → Next.js frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "esports-platform.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
