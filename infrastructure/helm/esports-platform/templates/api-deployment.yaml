apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "esports-platform.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "esports-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "esports-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime: always keep all current replicas up during rollout
  template:
    metadata:
      labels:
        {{- include "esports-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        # Force pod restart when ConfigMap changes (checksum-based)
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "esports-platform.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Spread across AZs to survive single AZ failure
      {{- if .Values.api.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "esports-platform.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      {{- end }}

      containers:
        - name: api
          image: {{ include "esports-platform.image" (dict "root" . "service" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Non-sensitive env from ConfigMap
          envFrom:
            - configMapRef:
                name: {{ include "esports-platform.configMapName" . }}

          # Sensitive env from ExternalSecret-created Secret
          {{- if .Values.externalSecrets.enabled }}
          envFrom:
            - configMapRef:
                name: {{ include "esports-platform.configMapName" . }}
            - secretRef:
                name: {{ include "esports-platform.secretName" . }}
          {{- end }}

          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}

          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

          # Graceful shutdown: allow in-flight requests to complete
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      terminationGracePeriodSeconds: 30
