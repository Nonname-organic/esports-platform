{{- if .Values.externalSecrets.enabled }}
# ExternalSecret pulls values from AWS Secrets Manager and materialises
# them as a Kubernetes Secret. Requires external-secrets-operator in cluster.
# Install: helm repo add external-secrets https://charts.external-secrets.io
#          helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "esports-platform.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "esports-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}

  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore

  target:
    name: {{ include "esports-platform.secretName" . }}
    creationPolicy: Owner
    template:
      type: Opaque
      # Merge secret values directly as env var keys
      data:
        DB_PASSWORD: "{{ `{{ .dbPassword }}` }}"
        SECRET_KEY: "{{ `{{ .secretKey }}` }}"
        DB_HOST: "{{ `{{ .dbHost }}` }}"
        REDIS_HOST: "{{ `{{ .redisHost }}` }}"
        SQS_MATCH_QUEUE_URL: "{{ `{{ .sqsMatchQueueUrl }}` }}"
        SQS_NOTIFICATION_QUEUE_URL: "{{ `{{ .sqsNotificationQueueUrl }}` }}"
        SQS_ANALYTICS_QUEUE_URL: "{{ `{{ .sqsAnalyticsQueueUrl }}` }}"
        DISCORD_WEBHOOK_URL: "{{ `{{ .discordWebhookUrl }}` }}"
        S3_BUCKET_NAME: "{{ `{{ .s3BucketName }}` }}"
        ALLOWED_ORIGINS: "{{ `{{ .allowedOrigins }}` }}"

  data:
    {{- range $localKey, $remoteRef := .Values.externalSecrets.remoteRefs }}
    - secretKey: {{ $localKey }}
      remoteRef:
        key: {{ $remoteRef }}
    {{- end }}
{{- end }}
