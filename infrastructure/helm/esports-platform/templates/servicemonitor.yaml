{{- if .Values.monitoring.enabled }}
# ServiceMonitor tells the Prometheus Operator to scrape the API /metrics endpoint.
# Requires kube-prometheus-stack (or prometheus-operator) installed in cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "esports-platform.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "esports-platform.labels" . | nindent 4 }}
    # Must match the Prometheus Operator's serviceMonitorSelector label
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      {{- include "esports-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.scrapeInterval | default "30s" }}
      # Honour the X-Request-ID header in scrape requests for traceability
      honorLabels: false
      relabelings:
        # Add deployment environment as a Prometheus label
        - targetLabel: environment
          replacement: {{ .Values.env.ENVIRONMENT | quote }}
        - targetLabel: service
          replacement: esports-platform-api
{{- end }}
